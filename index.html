<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Today in Computer Science</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #f5f3ef;
  --surface: #ffffff;
  --nav: #1a1744;
  --nav2: #26215C;
  --text: #1a1a2e;
  --muted: #6b6880;
  --border: rgba(0,0,0,0.09);
  --radius: 14px;
  --font: 'DM Sans', sans-serif;
  --serif: 'DM Serif Display', serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── TOPNAV ── */
.topnav {
  background: var(--nav);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-back {
  background: rgba(255,255,255,0.1);
  border: none;
  border-radius: 8px;
  color: #ccc9f7;
  font-size: 13px;
  font-family: var(--font);
  padding: 7px 14px;
  cursor: pointer;
  display: none;
  transition: background 0.15s;
}
.nav-back:hover { background: rgba(255,255,255,0.2); }
.nav-back.show { display: block; }
.app-title-inp {
  background: transparent;
  border: none;
  outline: none;
  font-size: 18px;
  font-weight: 600;
  color: #EEEDFE;
  font-family: var(--font);
  flex: 1;
  min-width: 0;
  border-bottom: 2px solid transparent;
  padding-bottom: 2px;
  transition: border-color 0.2s;
}
.app-title-inp:focus { border-bottom-color: rgba(175,169,236,0.5); }
.nav-actions { display: flex; gap: 8px; margin-left: auto; }
.nav-btn {
  background: rgba(255,255,255,0.12);
  border: none;
  border-radius: 8px;
  color: #AFA9EC;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font);
  padding: 7px 14px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.nav-btn:hover { background: rgba(255,255,255,0.2); }
.nav-btn.primary { background: #534AB7; color: #EEEDFE; }
.nav-btn.primary:hover { background: #3C3489; }

/* ── MONTH BAR ── */
.month-bar {
  background: var(--nav2);
  padding: 0 24px;
  display: flex;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.month-bar::-webkit-scrollbar { display: none; }
.mbtn {
  background: transparent;
  border: none;
  border-bottom: 3px solid transparent;
  color: #AFA9EC;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font);
  padding: 12px 16px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: color 0.15s, border-color 0.15s;
}
.mbtn:hover { color: #EEEDFE; }
.mbtn.active { color: #EEEDFE; border-bottom-color: #7F77DD; }

/* ── HOME VIEW ── */
.home-body { padding: 24px; max-width: 960px; margin: 0 auto; }
.home-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 10px;
}
.home-month-title {
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
}
.add-class-btn {
  background: var(--nav);
  color: #EEEDFE;
  border: none;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font);
  padding: 10px 18px;
  cursor: pointer;
  transition: background 0.15s;
}
.add-class-btn:hover { background: #26215C; }

/* ── CARD GRID ── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 14px;
}
.card-thumb {
  border-radius: var(--radius);
  padding: 1.25rem;
  cursor: pointer;
  transition: transform 0.15s;
  border: 2px solid transparent;
  position: relative;
  min-height: 160px;
  display: flex;
  flex-direction: column;
}
.card-thumb:hover { transform: translateY(-3px); }
.thumb-icon { font-size: 32px; margin-bottom: 10px; line-height: 1; display: block; }
.thumb-year {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 6px;
  display: inline-block;
  margin-bottom: 8px;
  letter-spacing: 0.03em;
}
.thumb-title { font-size: 14px; font-weight: 600; line-height: 1.35; }
.thumb-facts-count {
  font-size: 11px;
  margin-top: auto;
  padding-top: 10px;
  opacity: 0.6;
}
.del-card-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(0,0,0,0.12);
  border: none;
  border-radius: 6px;
  font-size: 11px;
  padding: 3px 7px;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s;
  font-family: var(--font);
}
.card-thumb:hover .del-card-btn { opacity: 1; }
.del-card-btn:hover { background: rgba(0,0,0,0.25); }

.empty-state {
  grid-column: 1/-1;
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: 15px;
}
.empty-icon { font-size: 40px; margin-bottom: 14px; display: block; }

/* ── CARD COLOURS ── */
.col0 { background: #EEEDFE; border-color: #AFA9EC; }
.col0 .thumb-year { background: #AFA9EC; color: #26215C; }
.col0 .thumb-title { color: #26215C; }
.col0 .thumb-facts-count { color: #534AB7; }

.col1 { background: #E1F5EE; border-color: #9FE1CB; }
.col1 .thumb-year { background: #9FE1CB; color: #04342C; }
.col1 .thumb-title { color: #04342C; }
.col1 .thumb-facts-count { color: #0F6E56; }

.col2 { background: #FAEEDA; border-color: #FAC775; }
.col2 .thumb-year { background: #FAC775; color: #412402; }
.col2 .thumb-title { color: #412402; }
.col2 .thumb-facts-count { color: #854F0B; }

.col3 { background: #FAECE7; border-color: #F5C4B3; }
.col3 .thumb-year { background: #F5C4B3; color: #4A1B0C; }
.col3 .thumb-title { color: #4A1B0C; }
.col3 .thumb-facts-count { color: #993C1D; }

.col4 { background: #E6F1FB; border-color: #B5D4F4; }
.col4 .thumb-year { background: #B5D4F4; color: #042C53; }
.col4 .thumb-title { color: #042C53; }
.col4 .thumb-facts-count { color: #0C447C; }

.col5 { background: #FBEAF0; border-color: #F4C0D1; }
.col5 .thumb-year { background: #F4C0D1; color: #4B1528; }
.col5 .thumb-title { color: #4B1528; }
.col5 .thumb-facts-count { color: #993556; }

.col6 { background: #EAF3DE; border-color: #C0DD97; }
.col6 .thumb-year { background: #C0DD97; color: #173404; }
.col6 .thumb-title { color: #173404; }
.col6 .thumb-facts-count { color: #3B6D11; }

.col7 { background: #F1EFE8; border-color: #D3D1C7; }
.col7 .thumb-year { background: #D3D1C7; color: #2C2C2A; }
.col7 .thumb-title { color: #2C2C2A; }
.col7 .thumb-facts-count { color: #5F5E5A; }

/* ── CARD VIEW ── */
.card-view-body { padding: 24px; max-width: 800px; margin: 0 auto; }
.exp-card {
  border-radius: 20px;
  padding: 2rem;
  border: 2px solid transparent;
  animation: slideUp 0.2s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* expanded card colours */
.col0.exp-card { background: #EEEDFE; border-color: #7F77DD; }
.col1.exp-card { background: #E1F5EE; border-color: #1D9E75; }
.col2.exp-card { background: #FAEEDA; border-color: #BA7517; }
.col3.exp-card { background: #FAECE7; border-color: #D85A30; }
.col4.exp-card { background: #E6F1FB; border-color: #185FA5; }
.col5.exp-card { background: #FBEAF0; border-color: #D4537E; }
.col6.exp-card { background: #EAF3DE; border-color: #3B6D11; }
.col7.exp-card { background: #F1EFE8; border-color: #5F5E5A; }

.exp-top { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; flex-wrap: wrap; }
.exp-icon-inp {
  font-size: 38px;
  border: none;
  background: transparent;
  outline: none;
  width: 52px;
  text-align: center;
  cursor: text;
  flex-shrink: 0;
  line-height: 1;
}
.exp-year-badge {
  border-radius: 8px;
  padding: 5px 14px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
}
.col0 .exp-year-badge { background: #7F77DD; }
.col1 .exp-year-badge { background: #1D9E75; }
.col2 .exp-year-badge { background: #BA7517; }
.col3 .exp-year-badge { background: #D85A30; }
.col4 .exp-year-badge { background: #185FA5; }
.col5 .exp-year-badge { background: #D4537E; }
.col6 .exp-year-badge { background: #3B6D11; }
.col7 .exp-year-badge { background: #5F5E5A; }

.exp-year-inp {
  font-size: 12px;
  font-weight: 600;
  border: none;
  background: transparent;
  outline: none;
  font-family: var(--font);
  color: rgba(255,255,255,0.95);
  min-width: 50px;
  max-width: 130px;
  border-bottom: 1.5px solid transparent;
  letter-spacing: 0.02em;
}
.exp-year-inp:focus { border-bottom-color: rgba(255,255,255,0.5); }

.exp-card-title {
  font-size: 24px;
  font-weight: 600;
  border: none;
  background: transparent;
  outline: none;
  font-family: var(--font);
  flex: 1;
  min-width: 120px;
  border-bottom: 2px solid transparent;
  padding-bottom: 2px;
  transition: border-color 0.2s;
}
.col0 .exp-card-title { color: #26215C; }
.col0 .exp-card-title:focus { border-bottom-color: #7F77DD; }
.col1 .exp-card-title { color: #04342C; }
.col1 .exp-card-title:focus { border-bottom-color: #1D9E75; }
.col2 .exp-card-title { color: #412402; }
.col2 .exp-card-title:focus { border-bottom-color: #BA7517; }
.col3 .exp-card-title { color: #4A1B0C; }
.col3 .exp-card-title:focus { border-bottom-color: #D85A30; }
.col4 .exp-card-title { color: #042C53; }
.col4 .exp-card-title:focus { border-bottom-color: #185FA5; }
.col5 .exp-card-title { color: #4B1528; }
.col5 .exp-card-title:focus { border-bottom-color: #D4537E; }
.col6 .exp-card-title { color: #173404; }
.col6 .exp-card-title:focus { border-bottom-color: #3B6D11; }
.col7 .exp-card-title { color: #2C2C2A; }
.col7 .exp-card-title:focus { border-bottom-color: #5F5E5A; }

.save-row { display: flex; align-items: center; gap: 12px; margin: 16px 0 20px; }
.exp-save-btn {
  padding: 9px 22px;
  border-radius: 9px;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  border: none;
  color: #fff;
  transition: opacity 0.15s, transform 0.1s;
}
.exp-save-btn:hover { opacity: 0.87; }
.exp-save-btn:active { transform: scale(0.97); }
.col0 .exp-save-btn { background: #534AB7; }
.col1 .exp-save-btn { background: #0F6E56; }
.col2 .exp-save-btn { background: #854F0B; }
.col3 .exp-save-btn { background: #993C1D; }
.col4 .exp-save-btn { background: #0C447C; }
.col5 .exp-save-btn { background: #993556; }
.col6 .exp-save-btn { background: #27500A; }
.col7 .exp-save-btn { background: #444441; }

.color-picker { display: flex; gap: 6px; }
.cpick {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.15s;
  flex-shrink: 0;
}
.cpick:hover { transform: scale(1.2); }
.cpick.selected { border-color: rgba(0,0,0,0.4); transform: scale(1.15); }
.cpick.c0 { background: #7F77DD; }
.cpick.c1 { background: #1D9E75; }
.cpick.c2 { background: #BA7517; }
.cpick.c3 { background: #D85A30; }
.cpick.c4 { background: #185FA5; }
.cpick.c5 { background: #D4537E; }
.cpick.c6 { background: #3B6D11; }
.cpick.c7 { background: #5F5E5A; }

.saved-toast {
  font-size: 12px;
  font-weight: 600;
  color: #1D9E75;
  opacity: 0;
  transition: opacity 0.3s;
  display: flex;
  align-items: center;
  gap: 5px;
}

/* ── FACTS SECTION ── */
.section-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.col0 .section-label { color: #534AB7; }
.col1 .section-label { color: #0F6E56; }
.col2 .section-label { color: #854F0B; }
.col3 .section-label { color: #993C1D; }
.col4 .section-label { color: #0C447C; }
.col5 .section-label { color: #993556; }
.col6 .section-label { color: #27500A; }
.col7 .section-label { color: #444441; }

.facts-list { list-style: none; }
.facts-list li {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 11px 0;
  border-top: 1px solid rgba(0,0,0,0.07);
}
.facts-list li:first-child { border-top: none; }
.fdot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 8px;
}
.col0 .fdot { background: #534AB7; }
.col1 .fdot { background: #0F6E56; }
.col2 .fdot { background: #854F0B; }
.col3 .fdot { background: #993C1D; }
.col4 .fdot { background: #0C447C; }
.col5 .fdot { background: #993556; }
.col6 .fdot { background: #27500A; }
.col7 .fdot { background: #444441; }

.fact-inp {
  font-size: 15px;
  border: none;
  background: transparent;
  outline: none;
  font-family: var(--font);
  flex: 1;
  min-width: 0;
  border-bottom: 1.5px solid transparent;
  padding-bottom: 2px;
  line-height: 1.5;
  transition: border-color 0.2s;
}
.col0 .fact-inp { color: #26215C; }
.col0 .fact-inp:focus { border-bottom-color: #7F77DD; }
.col1 .fact-inp { color: #04342C; }
.col1 .fact-inp:focus { border-bottom-color: #1D9E75; }
.col2 .fact-inp { color: #412402; }
.col2 .fact-inp:focus { border-bottom-color: #BA7517; }
.col3 .fact-inp { color: #4A1B0C; }
.col3 .fact-inp:focus { border-bottom-color: #D85A30; }
.col4 .fact-inp { color: #042C53; }
.col4 .fact-inp:focus { border-bottom-color: #185FA5; }
.col5 .fact-inp { color: #4B1528; }
.col5 .fact-inp:focus { border-bottom-color: #D4537E; }
.col6 .fact-inp { color: #173404; }
.col6 .fact-inp:focus { border-bottom-color: #3B6D11; }
.col7 .fact-inp { color: #2C2C2A; }
.col7 .fact-inp:focus { border-bottom-color: #5F5E5A; }

.fdel {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 13px;
  opacity: 0.22;
  padding: 2px 6px;
  flex-shrink: 0;
  margin-top: 4px;
  transition: opacity 0.15s;
  font-family: var(--font);
}
.fdel:hover { opacity: 0.65; }

.add-point-btn {
  margin-top: 12px;
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
  border: 2px dashed rgba(0,0,0,0.13);
  background: transparent;
  transition: background 0.15s, border-style 0.15s;
}
.col0 .add-point-btn { color: #534AB7; }
.col1 .add-point-btn { color: #0F6E56; }
.col2 .add-point-btn { color: #854F0B; }
.col3 .add-point-btn { color: #993C1D; }
.col4 .add-point-btn { color: #0C447C; }
.col5 .add-point-btn { color: #993556; }
.col6 .add-point-btn { color: #27500A; }
.col7 .add-point-btn { color: #444441; }
.add-point-btn:hover { background: rgba(0,0,0,0.05); border-style: solid; }

/* ── NOTES ── */
.notes-section { margin-top: 18px; }
.notes-inp {
  width: 100%;
  min-height: 80px;
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 14px;
  font-family: var(--font);
  resize: vertical;
  outline: none;
  border: 1.5px solid rgba(0,0,0,0.1);
  background: rgba(255,255,255,0.55);
  color: var(--text);
  transition: border-color 0.2s;
}
.notes-inp::placeholder { color: rgba(0,0,0,0.3); }
.notes-inp:focus { border-color: rgba(0,0,0,0.25); }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #fff;
  border-radius: 16px;
  padding: 28px;
  width: 340px;
  max-width: 92vw;
  animation: fadeIn 0.18s ease;
}
@keyframes fadeIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
.modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
.modal input, .modal select {
  width: 100%;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1.5px solid #e0e0e0;
  font-family: var(--font);
  font-size: 14px;
  margin-bottom: 12px;
  outline: none;
  transition: border-color 0.2s;
}
.modal input:focus, .modal select:focus { border-color: #7F77DD; }
.modal-btns { display: flex; gap: 10px; margin-top: 4px; }
.modal-btns button {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
  border: none;
  transition: opacity 0.15s;
}
.modal-btns .confirm { background: #1a1744; color: #fff; }
.modal-btns .confirm:hover { opacity: 0.85; }
.modal-btns .cancel { background: #f0f0f0; color: #444; }
.modal-btns .cancel:hover { background: #e4e4e4; }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .topnav { padding: 0 14px; }
  .home-body, .card-view-body { padding: 14px; }
  .cards-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  .exp-card-title { font-size: 20px; }
}
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
  <button class="nav-back" id="nav-back" onclick="goHome()">← Back</button>
  <input class="app-title-inp" id="app-title" value="Lesson Display" spellcheck="false" title="Click to rename"/>
  <div class="nav-actions">
    <button class="nav-btn" onclick="openExportModal()" title="Export all data as JSON">Export</button>
    <button class="nav-btn" onclick="openImportModal()" title="Import saved data">Import</button>
    <button class="nav-btn primary" onclick="openAddMonth()">+ Month</button>
  </div>
</nav>

<!-- MONTH BAR -->
<div class="month-bar" id="month-bar"></div>

<!-- HOME VIEW -->
<div id="view-home">
  <div class="home-body">
    <div class="home-header">
      <span class="home-month-title" id="home-month-title"></span>
      <button class="add-class-btn" onclick="addCard()">+ Add class</button>
    </div>
    <div class="cards-grid" id="cards-grid"></div>
  </div>
</div>

<!-- CARD VIEW -->
<div id="view-card" style="display:none">
  <div class="card-view-body">
    <div class="exp-card" id="exp-card">
      <div class="exp-top">
        <input class="exp-icon-inp" id="exp-icon-inp" maxlength="2" title="Click to change icon"/>
        <span class="exp-year-badge">
          <input class="exp-year-inp" id="exp-year-inp" maxlength="20" placeholder="Year group"/>
        </span>
        <input class="exp-card-title" id="exp-card-title" type="text" placeholder="Topic title"/>
      </div>
      <div class="save-row">
        <button class="exp-save-btn" onclick="saveCard()">Save</button>
        <div class="color-picker" id="color-picker"></div>
        <span class="saved-toast" id="saved-toast">✓ Saved</span>
      </div>
      <div class="section-label">Key points</div>
      <ul class="facts-list" id="exp-facts"></ul>
      <button class="add-point-btn" onclick="addPoint()">+ Add key point</button>
      <div class="notes-section">
        <div class="section-label" style="margin-top:18px">Notes</div>
        <textarea class="notes-inp" id="exp-notes" placeholder="Add notes, reminders, or anything for this lesson…"></textarea>
      </div>
    </div>
  </div>
</div>

<!-- ADD MONTH MODAL -->
<div class="modal-overlay" id="modal-month">
  <div class="modal">
    <h3>Add a month</h3>
    <input type="text" id="month-input" placeholder="e.g. October" maxlength="30"/>
    <div class="modal-btns">
      <button class="cancel" onclick="closeModal('modal-month')">Cancel</button>
      <button class="confirm" onclick="confirmAddMonth()">Add</button>
    </div>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="modal-overlay" id="modal-export">
  <div class="modal">
    <h3>Export data</h3>
    <p style="font-size:13px;color:#666;margin-bottom:14px">Copy this JSON and save it somewhere safe. Use Import to restore it on any device or browser.</p>
    <textarea id="export-text" style="width:100%;height:120px;font-family:monospace;font-size:11px;border:1.5px solid #e0e0e0;border-radius:8px;padding:10px;resize:none;outline:none" readonly></textarea>
    <div class="modal-btns" style="margin-top:12px">
      <button class="cancel" onclick="closeModal('modal-export')">Close</button>
      <button class="confirm" onclick="copyExport()">Copy</button>
    </div>
  </div>
</div>

<!-- IMPORT MODAL -->
<div class="modal-overlay" id="modal-import">
  <div class="modal">
    <h3>Import data</h3>
    <p style="font-size:13px;color:#666;margin-bottom:14px">Paste previously exported JSON below. This will replace all current data.</p>
    <textarea id="import-text" style="width:100%;height:120px;font-family:monospace;font-size:11px;border:1.5px solid #e0e0e0;border-radius:8px;padding:10px;resize:none;outline:none" placeholder="Paste JSON here…"></textarea>
    <div class="modal-btns" style="margin-top:12px">
      <button class="cancel" onclick="closeModal('modal-import')">Cancel</button>
      <button class="confirm" onclick="confirmImport()">Import</button>
    </div>
  </div>
</div>

<script>
const COLORS = ['col0','col1','col2','col3','col4','col5','col6','col7'];
const COLOR_HEX = ['#7F77DD','#1D9E75','#BA7517','#D85A30','#185FA5','#D4537E','#3B6D11','#5F5E5A'];
const MONTH_NAMES = ['September','October','November','December','January','February','March','April','May','June','July','August'];
const SK = 'lesson_app_v2';

function ls(k,v){
  try{
    if(v===undefined){const r=localStorage.getItem(k);return r?JSON.parse(r):null;}
    localStorage.setItem(k,JSON.stringify(v));
  }catch(e){return null;}
}

const DEFAULT_STATE = {
  title: 'Lesson Display',
  months: ['September','October','November'],
  activeMonth: 'September',
  cards: {
    'September': [
      {id:'c1',icon:'🌐',year:'Year 8',title:'HTML & CSS',color:'col0',facts:['Markup (HTML) defines structure; CSS controls appearance','Tags, attributes, selectors, and the box model are core concepts','Separation of concerns — content vs. presentation','Files render live in a browser — no compilation needed'],notes:''},
      {id:'c2',icon:'🤖',year:'Year 9',title:'VEX VR Robotics',color:'col1',facts:['Block-based or Python coding controls a virtual robot','Reinforces sequencing, loops, and conditional logic','Sensor inputs drive real-time decisions in the simulation','Decomposition — break the challenge into smaller moves'],notes:''},
      {id:'c3',icon:'⚙️',year:'Year 10',title:'Functions & Subprograms',color:'col2',facts:['A function is a named, reusable block of code','Parameters pass data in; return values pass results out','Reduces repetition and makes programs easier to maintain','Scope — variables inside a function are local by default'],notes:''},
      {id:'c4',icon:'🗄️',year:'Year 12',title:'SQL',color:'col3',facts:['Structured Query Language for relational databases','SELECT, WHERE, ORDER BY, GROUP BY are foundational clauses','JOINs combine data across multiple tables via keys','DDL (CREATE/ALTER) vs DML (INSERT/UPDATE/DELETE)'],notes:''}
    ]
  }
};

let state = ls(SK) || JSON.parse(JSON.stringify(DEFAULT_STATE));
let currentCardId = null;

function save(){ ls(SK, state); }

function uid(){ return 'c' + Date.now() + Math.random().toString(36).slice(2,5); }

// ── RENDER ──
function render(){
  document.getElementById('app-title').value = state.title;
  renderMonthBar();
  renderGrid();
}

function renderMonthBar(){
  const bar = document.getElementById('month-bar');
  bar.innerHTML = '';
  state.months.forEach(m => {
    const b = document.createElement('button');
    b.className = 'mbtn' + (m === state.activeMonth ? ' active' : '');
    b.textContent = m;
    b.onclick = () => { state.activeMonth = m; save(); render(); };
    b.ondblclick = e => { e.stopPropagation(); renameMonth(m); };
    b.title = 'Double-click to rename';
    bar.appendChild(b);
  });
}

function renderGrid(){
  const m = state.activeMonth;
  document.getElementById('home-month-title').textContent = m;
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  const cards = state.cards[m] || [];
  if(!cards.length){
    grid.innerHTML = '<div class="empty-state"><span class="empty-icon">📋</span>No classes yet for ' + m + '<br><br>Click <strong>+ Add class</strong> to get started</div>';
    return;
  }
  cards.forEach(c => {
    const div = document.createElement('div');
    div.className = 'card-thumb ' + c.color;
    div.onclick = () => openCard(c.id);
    div.innerHTML = `
      <span class="thumb-icon">${c.icon}</span>
      <div class="thumb-year">${c.year}</div>
      <div class="thumb-title">${c.title}</div>
      <div class="thumb-facts-count">${c.facts.length} point${c.facts.length !== 1 ? 's' : ''}</div>
      <button class="del-card-btn" title="Delete card">✕</button>`;
    div.querySelector('.del-card-btn').onclick = e => { e.stopPropagation(); deleteCard(c.id); };
    grid.appendChild(div);
  });
}

// ── OPEN / CLOSE CARD ──
function openCard(id){
  const m = state.activeMonth;
  const c = (state.cards[m] || []).find(x => x.id === id);
  if(!c) return;
  currentCardId = id;
  const card = document.getElementById('exp-card');
  card.className = 'exp-card ' + c.color;
  document.getElementById('exp-icon-inp').value = c.icon;
  document.getElementById('exp-year-inp').value = c.year;
  document.getElementById('exp-card-title').value = c.title;
  document.getElementById('exp-notes').value = c.notes || '';
  document.getElementById('saved-toast').style.opacity = '0';
  renderColorPicker(c);
  renderFacts(c);
  document.getElementById('view-home').style.display = 'none';
  document.getElementById('view-card').style.display = 'block';
  document.getElementById('nav-back').classList.add('show');
  window.scrollTo(0,0);
}

function goHome(){
  document.getElementById('view-home').style.display = 'block';
  document.getElementById('view-card').style.display = 'none';
  document.getElementById('nav-back').classList.remove('show');
  currentCardId = null;
  renderGrid();
  window.scrollTo(0,0);
}

function renderColorPicker(c){
  const cp = document.getElementById('color-picker');
  cp.innerHTML = '';
  COLORS.forEach((col, i) => {
    const dot = document.createElement('div');
    dot.className = 'cpick c' + i + (c.color === col ? ' selected' : '');
    dot.title = 'Change colour';
    dot.onclick = () => {
      c.color = col;
      document.getElementById('exp-card').className = 'exp-card ' + col;
      renderColorPicker(c);
      renderGrid();
    };
    cp.appendChild(dot);
  });
}

function renderFacts(c){
  const ul = document.getElementById('exp-facts');
  ul.innerHTML = '';
  c.facts.forEach((f, i) => {
    const li = document.createElement('li');
    const dot = document.createElement('span'); dot.className = 'fdot';
    const inp = document.createElement('input');
    inp.type = 'text'; inp.className = 'fact-inp'; inp.value = f;
    inp.oninput = () => { c.facts[i] = inp.value; };
    const del = document.createElement('button'); del.className = 'fdel'; del.textContent = '✕';
    del.onclick = () => { c.facts.splice(i, 1); renderFacts(c); };
    li.appendChild(dot); li.appendChild(inp); li.appendChild(del);
    ul.appendChild(li);
  });
}

function addPoint(){
  if(!currentCardId) return;
  const m = state.activeMonth;
  const c = (state.cards[m] || []).find(x => x.id === currentCardId);
  if(!c) return;
  c.facts.push('');
  renderFacts(c);
  const inputs = document.getElementById('exp-facts').querySelectorAll('.fact-inp');
  if(inputs.length) inputs[inputs.length-1].focus();
}

function saveCard(){
  if(!currentCardId) return;
  const m = state.activeMonth;
  const c = (state.cards[m] || []).find(x => x.id === currentCardId);
  if(!c) return;
  c.icon = document.getElementById('exp-icon-inp').value || c.icon;
  c.year = document.getElementById('exp-year-inp').value;
  c.title = document.getElementById('exp-card-title').value;
  c.notes = document.getElementById('exp-notes').value;
  save();
  renderGrid();
  const t = document.getElementById('saved-toast');
  t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 2200);
}

function addCard(){
  const m = state.activeMonth;
  if(!state.cards[m]) state.cards[m] = [];
  const idx = state.cards[m].length;
  const c = { id: uid(), icon: '📚', year: 'Year', title: 'New topic', color: COLORS[idx % COLORS.length], facts: ['Add a key point here'], notes: '' };
  state.cards[m].push(c);
  save(); renderGrid(); openCard(c.id);
}

function deleteCard(id){
  const m = state.activeMonth;
  if(!confirm('Delete this card?')) return;
  state.cards[m] = (state.cards[m] || []).filter(c => c.id !== id);
  save(); renderGrid();
}

// ── MONTHS ──
function openAddMonth(){
  document.getElementById('month-input').value = '';
  document.getElementById('modal-month').classList.add('show');
  setTimeout(() => document.getElementById('month-input').focus(), 50);
}

function confirmAddMonth(){
  const v = document.getElementById('month-input').value.trim();
  if(!v) return;
  if(!state.months.includes(v)){
    state.months.push(v);
    if(!state.cards[v]) state.cards[v] = [];
  }
  state.activeMonth = v;
  save(); render();
  closeModal('modal-month');
}

function renameMonth(old){
  const v = prompt('Rename "' + old + '" to:', old);
  if(!v || v === old) return;
  const idx = state.months.indexOf(old);
  state.months[idx] = v;
  if(state.activeMonth === old) state.activeMonth = v;
  if(state.cards[old]){ state.cards[v] = state.cards[old]; delete state.cards[old]; }
  save(); render();
}

// ── MODALS ──
function closeModal(id){
  document.getElementById(id).classList.remove('show');
}
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if(e.target === o) o.classList.remove('show'); });
});
document.addEventListener('keydown', e => {
  if(e.key === 'Escape') document.querySelectorAll('.modal-overlay.show').forEach(o => o.classList.remove('show'));
  if(e.key === 'Enter' && document.getElementById('modal-month').classList.contains('show')) confirmAddMonth();
});

// ── EXPORT / IMPORT ──
function openExportModal(){
  document.getElementById('export-text').value = JSON.stringify(state, null, 2);
  document.getElementById('modal-export').classList.add('show');
}
function copyExport(){
  const ta = document.getElementById('export-text');
  ta.select(); document.execCommand('copy');
  const btn = document.querySelector('#modal-export .confirm');
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = 'Copy', 1500);
}
function openImportModal(){
  document.getElementById('import-text').value = '';
  document.getElementById('modal-import').classList.add('show');
}
function confirmImport(){
  try {
    const parsed = JSON.parse(document.getElementById('import-text').value);
    if(!parsed.months || !parsed.cards) throw new Error('Invalid');
    state = parsed;
    save(); render();
    closeModal('modal-import');
    goHome();
  } catch(e) {
    alert('Invalid data — please paste a valid exported JSON.');
  }
}

// ── APP TITLE ──
document.getElementById('app-title').addEventListener('input', function(){
  state.title = this.value; save();
  document.title = this.value || 'Lesson Display';
});

// ── INIT ──
render();
document.title = state.title || 'Lesson Display';
</script>
</body>
</html>
